<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>brain_shelf - Find Books & Knowledge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <div class="header__inner">
            <h1 class="header__logo">brain<span>shelf</span></h1>
            <p class="header__tagline">Search books & Wikipedia in one place</p>
            <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">🌙</button>
        </div>
    </header>

    <!-- ==================== SEARCH SECTION ==================== -->
    <main class="container">
        <section class="search" aria-labelledby="searchHeading">
            <h2 id="searchHeading" class="sr-only">Search and Filters</h2>
            <div class="search__box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search for any topic... (e.g. machine learning, african history)"
                    autocomplete="off"
                >
                <button id="searchBtn" onclick="handleSearch()">Search</button>
                <button id="surpriseBtn" class="btn-secondary" onclick="surpriseMe()" title="Random Search">✨</button>
            </div>

            <!-- FILTERS: filter by type + sort books -->
            <div class="search__controls">
                <div class="search__filter-group">
                    <label for="filterType">Show:</label>
                    <select id="filterType" onchange="applyFilters()">
                        <option value="all">All Results</option>
                        <option value="books">Books Only</option>
                        <option value="wiki">Wikipedia Only</option>
                    </select>
                </div>
                <div class="search__filter-group">
                    <label for="sortBy">Sort books by:</label>
                    <select id="sortBy" onchange="applyFilters()">
                        <option value="relevance">Relevance</option>
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>
                <button class="search__reading-list-btn" onclick="toggleReadingList()">
                    📚 Reading List (<span id="listCount">0</span>)
                </button>
            </div>
        </section>

        <!-- STATUS MESSAGES (loading, errors) -->
        <div id="statusMessage" class="status-message hidden"></div>

        <!-- ==================== RESULTS ==================== -->
        <section id="results" class="results-grid" aria-live="polite">
            <!-- Results get inserted here by JavaScript -->
        </section>

        <!-- ==================== READING LIST SIDEBAR ==================== -->
        <aside id="readingList" class="reading-list hidden" aria-labelledby="readingListHeading">
            <div class="reading-list-header">
                <h2 id="readingListHeading">📚 Your Reading List</h2>
                <div class="rl-controls">
                    <button onclick="sortReadingList('newest')" title="Newest first">↓</button>
                    <button onclick="sortReadingList('oldest')" title="Oldest first">↑</button>
                    <button onclick="toggleReadingList()" title="Close">✕</button>
                </div>
            </div>
            <div id="readingListItems" class="reading-list__items">
                <!-- Saved items appear here -->
            </div>
            <button class="btn-clear-all" onclick="clearReadingList()">Clear All</button>
        </aside>
    </main>

    <!-- ==================== FOOTER ==================== -->
    <footer class="footer">
        <p class="footer__text">
            Powered by 
            <a href="https://openlibrary.org/developers/api" target="_blank" class="footer__link">Open Library API</a> & 
            <a href="https://www.mediawiki.org/wiki/API:Main_page" target="_blank" class="footer__link">Wikipedia API</a>
        </p>
        <p class="footer__text">Built by Axcel Ishimwe | ALU 2026</p>
    </footer>

    <script src="app.js"></script>

    <!-- ==================== MODALS ==================== -->
    <div id="confirmModal" class="modal hidden">
        <div class="modal-content">
            <h3>Are you sure?</h3>
            <p id="modalMessage">This will permanently remove all items from your reading list.</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" id="modalConfirmBtn">Yes, Clear All</button>
            </div>
        </div>
    </div>
</body>
</html>
